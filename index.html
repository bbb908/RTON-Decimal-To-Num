<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTON Number Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card h2 {
            margin: 0;
            font-size: 1.4rem;
            text-align: center;
            color: #0056b3;
            border-bottom: 2px solid #f4f4f9;
            padding-bottom: 10px;
        }
        label {
            font-size: 0.95rem;
            font-weight: 600;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #0056b3;
        }
        .output-box {
            background: #e9ecef;
            border: 1px solid #ced4da;
            color: #212529;
            font-family: monospace;
            font-size: 1.1rem;
            min-height: 42px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-radius: 4px;
            word-break: break-all;
        }
        .note {
            font-size: 0.8rem;
            color: #666;
            margin-top: -10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>RTON -> Decimal</h2>
    <label for="input1">Input (RTON Number):</label>
    <p class="note">Supports Decimal (123) or Hex (0x7B)</p>
    <input type="text" id="input1" placeholder="Enter value..." oninput="calculate1()">

    <label>Output (Integer):</label>
    <div class="output-box" id="output1"></div>
</div>

<div class="card">
    <h2>Decimal -> RTON</h2>
    <label for="input2">Input (Decimal):</label>
    <p class="note">Supports Decimal (123) or Hex (0x7B)</p>
    <input type="text" id="input2" placeholder="Enter value..." oninput="calculate2()">

    <label>Output (RTON Number):</label>
    <div class="output-box" id="output2"></div>
</div>

<script src="script.js"></script>
</body>
</html>
